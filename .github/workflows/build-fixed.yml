name: Florida Fixed Android Arm64

on:
  workflow_dispatch:
  push:
    branches: ["main", "ci"]
    paths:
      - ".github/workflows/build-fixed.yml"
      - "scripts/apply_florida_17_15_3.py"
      - "patches/**"

permissions:
  contents: read

jobs:
  android_arm64_build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          local-cache: false
          link-to-sdk: true

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y build-essential tree ninja-build gcc-multilib g++-multilib lib32stdc++-9-dev flex bison ruby ruby-dev python3-requests python3-setuptools python3-dev python3-pip libc6-dev libc6-dev-i386
          sudo gem install fpm -v 1.11.0 --no-document
          python3 -m pip install lief graphlib

      - name: Build Florida Frida Server 17.15.3 for Android arm64
        shell: bash
        run: |
          set -euxo pipefail

          git config --global user.name "GitHub Actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"

          git clone https://github.com/frida/frida
          cd frida
          git checkout 17.15.3
          git submodule update --init --recursive

          cd subprojects/frida-core
          python3 ../../../scripts/apply_florida_17_15_3.py rpc
          git am --whitespace=nowarn ../../../patches/frida-core/0002-Florida-frida_agent_so.patch
          python3 ../../../scripts/apply_florida_17_15_3.py symbol

          for patch in ../../../patches/frida-core/*.patch
          do
            case "$(basename "$patch")" in
              0001-Florida-string_frida_rpc.patch|0002-Florida-frida_agent_so.patch|0003-Florida-symbol_frida_agent_main.patch)
                echo "Skip already handled patch: $patch"
                ;;
              *)
                git am --whitespace=nowarn "$patch"
                ;;
            esac
          done

          cd ../frida-gum
          git am --whitespace=nowarn ../../../patches/frida-gum/*.patch

          cd ../../..
          mkdir build-android-arm64
          cd build-android-arm64
          ../frida/configure --host=android-arm64
          make

          cd ..
          mkdir -p output
          cp build-android-arm64/subprojects/frida-core/server/frida-server output/florida-server-17.15.3-android-arm64
          gzip -f output/florida-server-17.15.3-android-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: florida-server-17.15.3-android-arm64
          path: output/florida-server-17.15.3-android-arm64.gz
